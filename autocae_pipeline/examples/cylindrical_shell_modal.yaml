# 样本 2：圆柱壳模态分析
# 典型薄壁圆柱壳（铝合金 7075-T6），用于研究固有频率
# 尺寸：半径 50mm，长度 200mm，壁厚 1.5mm
# 分析类型：模态（前 10 阶固有频率）

metadata:
  case_name: "Cylindrical Shell Modal Analysis"
  source: "generated_sample"
  status: "draft"

topology: shell

geometry:
  geometry_type: cylindrical_shell
  length: 200.0    # mm — 轴向长度
  width:  100.0    # mm — 直径（= 2 × 半径 50mm）
  thickness: 1.5   # mm — 壁厚
  extra:
    radius: 50.0         # 中面半径 [mm]
    wall_thickness: 1.5  # 壁厚（与 thickness 一致）

layup:
  # 单层铝合金（使用"准各向同性"近似处理均质材料）
  - angle:     0.0
    thickness: 1.5
    material_id: al7075

materials:
  - material_id: al7075
    name: Aluminium_7075_T6
    E1:   71000.0   # MPa  （铝合金弹性模量，约 71 GPa）
    E2:   71000.0   # MPa  （各向同性，E1=E2）
    G12:  26700.0   # MPa  （G = E / 2(1+nu)）
    nu12:  0.33     # 泊松比
    rho:   2.81e-9  # kg/mm³ （2810 kg/m³）

features: []

loads:
  # 模态分析无外载荷（固有频率计算只需质量矩阵和刚度矩阵）
  - load_type: point_force
    magnitude: 0.0
    location:  LOAD_END
    direction: [1.0, 0.0, 0.0]

boundary_conditions:
  # 一端固支（悬臂圆柱壳）
  - bc_type: fixed
    location: FIXED_END

analysis_type: modal

mesh_preferences:
  global_size: 3.0    # mm（模态分析需要足够精细的网格捕捉高阶模态）
  element_type: auto
  min_quality: 0.4
  optimize_passes: 3

output_requests:
  field_outputs: [U]
  history_outputs: [U]
  generate_plots: true
