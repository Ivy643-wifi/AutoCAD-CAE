# =============================================================================
# CaseSpec — 平板单轴拉伸（标准 ASTM 试样）
# =============================================================================
# 拓扑：laminate（层合板）
# 几何：flat_plate（矩形平板）
# 分析：static_tension（线性静力拉伸）
# 材料：T300/Epoxy 碳纤维单向板
# 铺层：[0/45/-45/90]s（准各向同性，8 层，总厚度 2 mm）
# =============================================================================

metadata:
  case_name: "Flat Plate Uniaxial Tension"
  source: "example"
  status: "draft"
  notes: "Standard ASTM coupon: 200 × 25 × 2 mm, [0/45/-45/90]s carbon/epoxy"

topology: laminate

geometry:
  geometry_type: flat_plate
  length: 200.0       # mm — 试样总长
  width:   25.0       # mm — 试样宽度
  thickness: 2.0      # mm — 总厚度（8 × 0.25 mm/ply）
  extra: {}

layup:
  - { angle:   0.0, thickness: 0.25, material_id: carbon_ud }
  - { angle:  45.0, thickness: 0.25, material_id: carbon_ud }
  - { angle: -45.0, thickness: 0.25, material_id: carbon_ud }
  - { angle:  90.0, thickness: 0.25, material_id: carbon_ud }
  - { angle:  90.0, thickness: 0.25, material_id: carbon_ud }
  - { angle: -45.0, thickness: 0.25, material_id: carbon_ud }
  - { angle:  45.0, thickness: 0.25, material_id: carbon_ud }
  - { angle:   0.0, thickness: 0.25, material_id: carbon_ud }

materials:
  - material_id: carbon_ud
    name: "Carbon_UD_T300_Epoxy"
    E1:   135000.0   # MPa — 纵向弹性模量
    E2:    10000.0   # MPa — 横向弹性模量
    G12:    5200.0   # MPa — 面内剪切模量
    nu12:      0.30  # 泊松比
    rho:     1.58e-9 # t/mm³（CalculiX 单位制）

features: []

loads:
  - load_type: tension
    magnitude: 10000.0   # N  — 施加在 LOAD_END 端面的拉力
    location: LOAD_END
    direction: [1.0, 0.0, 0.0]

boundary_conditions:
  - bc_type: fixed
    location: FIXED_END
    constrained_dofs: []   # 空列表 → 全约束（夹持端）

analysis_type: static_tension

mesh_preferences:
  global_size: 2.0         # mm — 全局网格尺寸
  element_type: auto
  min_quality: 0.3
  optimize_passes: 3
  local_refinements: {}

output_requests:
  field_outputs: [U, S, E, RF]   # 位移、应力、应变、反力
  history_outputs: [U, RF]
  generate_plots: true
  generate_report: false
