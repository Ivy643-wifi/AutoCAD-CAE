# 样本 3：开孔平板压缩屈曲（OHC — Open Hole Compression Buckling）
# 复合材料开孔压缩标准试验件（参考 ASTM D6484）
# 含中心圆孔的层合板，研究孔边压缩失稳载荷
# 铺层：[0/±45/90]s 准各向同性

metadata:
  case_name: "Open Hole Compression Buckling"
  source: "generated_sample"
  status: "draft"

topology: laminate

geometry:
  geometry_type: open_hole_plate
  length: 300.0     # mm — 压缩加载方向（X 轴）
  width:  36.0      # mm （ASTM 标准宽度）
  thickness: 4.0    # mm — 总层合板厚度（16 层 × 0.25mm）
  extra:
    hole_diameter: 6.0   # mm — 中心圆孔直径（width/6 = 6mm，标准比例）

layup:
  # [0/45/-45/90]s 准各向同性 16 层铺层（对称）
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:   -45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:   -45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:   -45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:   -45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:    45.0
    thickness: 0.25
    material_id: carbon_epoxy
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_epoxy

materials:
  - material_id: carbon_epoxy
    name: Carbon_T700_Epoxy_QI
    E1:   130000.0   # MPa  纤维方向刚度
    E2:    8500.0    # MPa  横向刚度
    G12:   4800.0    # MPa  面内剪切模量
    nu12:  0.32      # 主泊松比
    rho:   1.55e-9   # kg/mm³

features:
  - name: cutout   # 启用圆孔特征（OpenHolePlateTemplate 会挖出中心孔）
    enabled: true
    params:
      diameter: 6.0   # 孔径 [mm]（对应 geometry.extra.hole_diameter）

loads:
  # 压缩载荷（负方向 X，总压缩力 5000N）
  - load_type: compression
    magnitude: -5000.0   # N（负值表示压缩）
    location:  LOAD_END
    direction: [-1.0, 0.0, 0.0]

boundary_conditions:
  # 一端固支，另一端施加压缩（防止整体刚体位移）
  - bc_type: fixed
    location: FIXED_END

analysis_type: static_compression

mesh_preferences:
  global_size: 1.5    # mm（孔边需要较细网格，设置较小尺寸）
  element_type: auto
  min_quality: 0.3
  optimize_passes: 4

output_requests:
  field_outputs: [U, S, E]
  history_outputs: [U, RF]
  generate_plots: true
