# 样本 1：夹芯板三点弯曲
# 典型航空夹芯板（碳纤维面板 + Nomex 蜂窝芯）
# 尺寸：300mm × 100mm，芯厚 20mm，面板各 1mm
# 分析类型：弯曲（静力）

metadata:
  case_name: "Sandwich Plate Three-Point Bending"
  source: "generated_sample"
  status: "draft"

topology: sandwich

geometry:
  geometry_type: sandwich_plate
  length: 300.0   # mm — 弯曲跨度方向（X 轴）
  width:  100.0   # mm — Y 方向
  thickness: 22.0 # mm — 总厚度（芯 20mm + 面板 2×1mm）

layup:
  # 上面板：[0/90]s 准各向同性铺层
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_ud
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_ud
  - angle:    90.0
    thickness: 0.25
    material_id: carbon_ud
  - angle:     0.0
    thickness: 0.25
    material_id: carbon_ud

materials:
  - material_id: carbon_ud
    name: Carbon_UD_HM_Epoxy
    E1:   180000.0   # MPa  高模量碳纤维方向
    E2:    8000.0    # MPa  横向
    G12:   4500.0    # MPa
    nu12:  0.28
    rho:   1.60e-9   # kg/mm³

features: []

loads:
  - load_type: bending
    magnitude: 2000.0   # N（三点弯曲中点集中力）
    location:  LOAD_END
    direction: [0.0, 0.0, -1.0]  # Z 方向向下

boundary_conditions:
  - bc_type: simply_supported
    location: FIXED_END

analysis_type: bending

mesh_preferences:
  global_size: 5.0    # mm（较粗网格，快速验证）
  element_type: auto
  min_quality: 0.3
  optimize_passes: 2

output_requests:
  field_outputs: [U, S, E, RF]
  history_outputs: [U]
  generate_plots: true
